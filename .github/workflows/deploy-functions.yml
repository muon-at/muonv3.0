name: Deploy Cloud Functions

on:
  push:
    branches:
      - main
    paths:
      - 'functions/**'
      - '.github/workflows/deploy-functions.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
      
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v1
        with:
          credentials_json: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS }}
      
      - name: Setup gcloud CLI
        uses: google-github-actions/setup-gcloud@v1
      
      - name: Install Firebase CLI
        run: npm install -g firebase-tools
      
      - name: Deploy Cloud Functions
        run: |
          gcloud functions deploy sendChatNotification \
            --runtime nodejs20 \
            --trigger-resource chat_channels \
            --trigger-event providers/cloud.firestore/eventTypes/document.onCreate \
            --source functions \
            --entry-point sendChatNotification \
            --region us-central1 \
            --project brukerstats-dashboard
          
          gcloud functions deploy sendDMNotification \
            --runtime nodejs20 \
            --trigger-resource chat_dms \
            --trigger-event providers/cloud.firestore/eventTypes/document.onCreate \
            --source functions \
            --entry-point sendDMNotification \
            --region us-central1 \
            --project brukerstats-dashboard
